<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}VAPT Manager{% endblock %} — Bank Kalbar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['JetBrains Mono', 'monospace'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        cyber: {
                            400: '#22c55e',
                            500: '#00ff88',
                            600: '#16a34a',
                        },
                        dark: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #e2e8f0; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .cyber-grid {
            background-image:
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .glow-green { box-shadow: 0 0 20px rgba(0, 255, 136, 0.15); }
        .glow-green:hover { box-shadow: 0 0 30px rgba(0, 255, 136, 0.3); }

        .sev-critical { background: #dc2626; color: white; }
        .sev-high { background: #f97316; color: white; }
        .sev-medium { background: #eab308; color: black; }
        .sev-low { background: #3b82f6; color: white; }
        .sev-info { background: #6b7280; color: white; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInUp 0.4s ease-out forwards; opacity: 0; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

        /* Mobile menu */
        .mobile-menu { display: none; }
        .mobile-menu.open { display: flex; }
        @media (max-width: 640px) {
            .desktop-nav { display: none; }
            .hamburger-btn { display: flex !important; }
            .nav-breadcrumb { display: none; }
            .nav-logo-text { font-size: 0.9rem; }
            .filter-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
            .filter-scroll::-webkit-scrollbar { height: 3px; }
            .filter-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        }
        @media (min-width: 641px) {
            .mobile-menu { display: none !important; }
        }
    </style>
    <script>
        const API_BASE = "/api";
        async function api(endpoint, options = {}) {
            const token = localStorage.getItem("token");
            const headers = { "Content-Type": "application/json" };
            if (token) headers["Authorization"] = `Bearer ${token}`;
            const res = await fetch(API_BASE + endpoint, { ...options, headers: { ...headers, ...options.headers } });
            if (res.status === 401) { localStorage.removeItem("token"); window.location.href = "/login"; throw new Error("Unauthorized"); }
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        function sevClass(severity) {
            const map = { critical: 'sev-critical', high: 'sev-high', medium: 'sev-medium', low: 'sev-low', informational: 'sev-info' };
            return map[severity] || 'sev-info';
        }

        function statusBadge(status) {
            const colors = {
                // Project statuses
                PROPOSAL: 'bg-purple-900 text-purple-200 border border-purple-700',
                SCOPING: 'bg-indigo-900 text-indigo-200 border border-indigo-700',
                ONGOING: 'bg-blue-900 text-blue-200 border border-blue-700',
                REMEDIATION: 'bg-yellow-900 text-yellow-200 border border-yellow-700',
                FINISHED: 'bg-green-900 text-green-200 border border-green-700',
                // Legacy project statuses
                planning: 'bg-purple-900 text-purple-200 border border-purple-700',
                in_progress: 'bg-blue-900 text-blue-200 border border-blue-700',
                on_hold: 'bg-yellow-900 text-yellow-200 border border-yellow-700',
                completed: 'bg-green-900 text-green-200 border border-green-700',
                // Finding statuses
                open: 'bg-red-900 text-red-200 border border-red-700',
                in_progress: 'bg-blue-900 text-blue-200 border border-blue-700',
                resolved: 'bg-green-900 text-green-200 border border-green-700',
                accepted: 'bg-gray-700 text-gray-200 border border-gray-600',
                false_positive: 'bg-gray-700 text-gray-200 border border-gray-600',
            };
            return colors[status] || 'bg-gray-700 text-gray-200 border border-gray-600';
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            if (menu) menu.classList.toggle('open');
        }

        // Close mobile menu on outside click
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('mobile-menu');
            const hamburger = document.getElementById('hamburger-btn');
            if (menu && hamburger && !menu.contains(e.target) && !hamburger.contains(e.target)) {
                menu.classList.remove('open');
            }
        });
    </script>
</head>
<body class="min-h-screen cyber-grid">
    {% block content %}{% endblock %}
</body>
</html>
